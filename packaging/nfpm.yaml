# nfpm config — produces both .deb and .rpm for the Citeck Launcher desktop app.
# Run: VERSION=2.3.2 ARCH=amd64 nfpm package --config packaging/nfpm.yaml \
#        --packager deb --target dist/citeck-launcher_2.3.2_linux_amd64.deb
# Package name MUST stay "citeck-launcher" — same as the legacy 1.* deb — so
# dpkg treats a 2.* install as an in-place upgrade and removes 1.*'s files.
name: citeck-launcher
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: "Citeck LLC <info@citeck.ru>"
vendor: "Citeck LLC"
homepage: "https://github.com/Citeck/citeck-launcher"
description: |
  Citeck Launcher — manage Citeck namespaces and Docker containers.
license: "Citeck"
contents:
  - src: ./build/bin/citeck-launcher
    dst: /usr/bin/citeck-launcher
    file_info:
      mode: 0755
  - src: ./packaging/linux/citeck-launcher.desktop
    dst: /usr/share/applications/citeck-launcher.desktop
    file_info:
      mode: 0644
  - src: ./icons/logo.png
    dst: /usr/share/icons/hicolor/256x256/apps/citeck-launcher.png
    file_info:
      mode: 0644

# Runtime shared-library deps: the Wails binary dynamically links GTK3 + WebKit2GTK.
# (Docker is intentionally NOT a dependency — it's an external runtime, like 1.*.)
overrides:
  deb:
    depends:
      # Ubuntu 24.04+ renamed libgtk-3-0 -> libgtk-3-0t64 (time_t transition);
      # the alternative keeps the package installable on both new and old systems.
      - "libgtk-3-0t64 | libgtk-3-0"
      - libwebkit2gtk-4.1-0
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
