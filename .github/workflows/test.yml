name: test

# Reusable test suite — the single source of truth for "is this commit good?".
# Called by ci.yml (PRs / release branches) and as the gate in release-go.yml
# (on a v*.*.* tag, before any build/release work). Not triggered on its own.
on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: |
          mkdir -p internal/daemon/webdist
          echo '<html></html>' > internal/daemon/webdist/index.html
          go vet ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: ./...

      - name: Go tests (race detector + coverage)
        run: |
          set -o pipefail
          go test -race -cover ./internal/... | tee /tmp/go-test-cover.txt

      - name: Coverage floors (contract-critical packages)
        run: bash scripts/ci/coverage-floor.sh /tmp/go-test-cover.txt

      - name: govulncheck (allowlist in scripts/ci/govulncheck-allowlist.txt)
        run: bash scripts/ci/govulncheck.sh

      - name: deadcode (allowlist in scripts/ci/deadcode-allowlist.txt)
        run: bash scripts/ci/deadcode.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Web UI tests
        run: cd web && pnpm install --frozen-lockfile && pnpm vitest run

      - name: Web UI dependency audit (prod, high+)
        run: cd web && pnpm audit --prod --audit-level high

      - name: Build server binary
        run: make build

      - name: Cross-compile check (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/citeck-ci-arm64 ./cmd/citeck
          rm /tmp/citeck-ci-arm64
