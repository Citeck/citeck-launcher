name: CI

# Plain pushes to master do NOT run CI. The reusable test suite
# (.github/workflows/test.yml) runs on pull requests to master and on
# release/** branch pushes; for releases it runs as the gate on the v*.*.*
# tag (see release-go.yml).
on:
  pull_request:
    branches: [master]
  push:
    branches: ["release/**"]

jobs:
  test:
    uses: ./.github/workflows/test.yml
