name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Go vet
        run: go vet ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.7.2

      - name: Go tests (race detector)
        run: |
          mkdir -p internal/daemon/webdist
          echo '<html></html>' > internal/daemon/webdist/index.html
          go test -race ./internal/...

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Web UI tests
        run: cd web && npm ci && npx vitest run

      - name: Build server binary
        run: |
          mkdir -p internal/daemon/webdist
          echo '<html></html>' > internal/daemon/webdist/index.html
          go build -o citeck ./cmd/citeck

      - name: Build desktop binary
        env:
          CGO_ENABLED: "1"
        run: go build -o citeck-desktop ./cmd/citeck-desktop
