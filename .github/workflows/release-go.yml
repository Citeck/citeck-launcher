name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Full test suite gate (reusable workflow, same as CI) — must pass before any
  # build or release work runs. Plain master pushes no longer run CI, so this
  # tag-time run is the gate for everything that gets published.
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          cd web && pnpm install --frozen-lockfile && cd ..
          make release-server

      - uses: actions/upload-artifact@v4
        with:
          name: citeck-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  desktop-linux:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install GTK3 / WebKit dev libs
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.0

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cd web && pnpm install --frozen-lockfile && cd ..
          make release-desktop-linux

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.arch }}
          path: dist/citeck-desktop_*
          if-no-files-found: error

  desktop-windows:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install make
        run: choco install make --no-progress

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.*

      - name: Build release artifacts
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cd web && pnpm install --frozen-lockfile && cd ..
          make release-desktop-windows

      # --- Code signing (disabled — enable when secrets are configured) ---
      # Required secrets: WINDOWS_CERT_PFX (base64 .pfx), WINDOWS_CERT_PASSWORD
      # - name: Sign MSI
      #   env:
      #     WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
      #     WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      #   run: |
      #     [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))
      #     signtool sign /f cert.pfx /p $env:WINDOWS_CERT_PASSWORD /fd sha256 /tr http://timestamp.digicert.com /td sha256 dist\*.msi

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-${{ matrix.arch }}
          path: dist/citeck-desktop_*
          if-no-files-found: error

  desktop-macos:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cd web && pnpm install --frozen-lockfile && cd ..
          make release-desktop-macos

      # --- Codesign + notarization (disabled — enable when secrets are configured) ---
      # Required secrets: MACOS_CERT_P12 (base64), MACOS_CERT_PASSWORD,
      #                   MACOS_NOTARY_APPLE_ID, MACOS_NOTARY_TEAM_ID, MACOS_NOTARY_PASSWORD
      # - name: Codesign + notarize
      #   run: |
      #     codesign --deep --force --options runtime --sign "Developer ID Application: Citeck LLC" dist/citeck-launcher.app
      #     # (rebuild the dmg after signing the .app, then:)
      #     xcrun notarytool submit dist/*.dmg --apple-id "$MACOS_NOTARY_APPLE_ID" --team-id "$MACOS_NOTARY_TEAM_ID" --password "$MACOS_NOTARY_PASSWORD" --wait
      #     xcrun stapler staple dist/*.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.arch }}
          path: dist/*.dmg*
          if-no-files-found: error

  release:
    needs: [build, desktop-linux, desktop-windows, desktop-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract changelog
        id: changelog
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${VERSION_TAG#v}"
          # Release notes are the English changelog for this version (the in-app
          # auto-updater shows the localized variants from changelog/<ver>/<locale>.md).
          NOTES="changelog/${TAG_VERSION}/en.md"
          if [ -f "$NOTES" ]; then
            body="$(cat "$NOTES")"
          else
            body="Release ${TAG_VERSION}"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            citeck_*.tar.gz
            citeck_*.tar.gz.sha256
            citeck-desktop_*
            install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
